name: CDK Deploy

on:
  push:
    branches: ['main']
  workflow_dispatch: {}

jobs:
  aws_cdk:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install AWS CDK
        run: npm i -g aws-cdk

      - name: Configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: 'eu-north-1'

      - name: Synth stack
        run: cdk synth

      - name: Deploy stack
        run: cdk deploy --all --require-approval never 2>&1 | tee deploy.log

      - name: Extract ApiUrl from deploy log
        id: extract_api_url
        run: |
          API_URL=$(grep -m1 'GuessTheNumberStack.*ApiUrl' deploy.log | sed -E 's/.*ApiUrl = //; s/[[:space:]]*$//')
          if [ -z "$API_URL" ]; then
            echo "Failed to extract ApiUrl from deploy.log"
            exit 1
          fi
          echo "API_URL=$API_URL" >> $GITHUB_ENV

      - name: Run integration tests
        env:
          API_URL: ${{ env.API_URL }}
        run: npm run test:integration